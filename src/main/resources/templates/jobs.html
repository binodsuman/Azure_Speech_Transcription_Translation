<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recent Jobs - Speech Diarization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .jobs-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .jobs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .jobs-header h2 {
            color: #333;
        }

        .btn-new {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: transform 0.2s;
        }

        .btn-new:hover {
            transform: translateY(-2px);
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px;
            background: #f8faff;
            color: #333;
            font-weight: 600;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f8faff;
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
            display: inline-block;
        }

        .status-UPLOADING {
            background: #fff3cd;
            color: #856404;
        }

        .status-PROCESSING {
            background: #cce5ff;
            color: #004085;
        }

        .status-COMPLETED {
            background: #d4edda;
            color: #155724;
        }

        .status-FAILED {
            background: #f8d7da;
            color: #721c24;
        }

        .progress-indicator {
            width: 60px;
            height: 6px;
            background: #f0f0f0;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .btn-view {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.2s;
        }

        .btn-view:hover {
            background: #f0f4ff;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state .emoji {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .empty-state p {
            margin-bottom: 30px;
        }

        .btn-primary {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: transform 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📋 Recent Transcription Jobs</h1>
    </div>

    <div class="jobs-card">
        <div class="jobs-header">
            <h2>Job History</h2>
            <a href="/" class="btn-new">+ New Transcription</a>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                <tr>
                    <th>Job ID</th>
                    <th>File Name</th>
                    <th>Size</th>
                    <th>Created</th>
                    <th>Status</th>
                    <th>Progress</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="job : ${jobs}">
                    <td>
                        <span th:text="${#strings.substring(job.jobId, 0, 8)} + '...'"></span>
                    </td>
                    <td th:text="${job.fileName}">audio.wav</td>
                    <td th:text="${job.formattedFileSize}">10 MB</td>
                    <td th:text="${#temporals.format(job.createdAt, 'HH:mm:ss')}">12:00</td>
                    <td>
                                <span th:class="'status-badge status-' + ${job.status}"
                                      th:text="${job.status}">PROCESSING</span>
                    </td>
                    <td>
                        <div class="progress-indicator">
                            <div class="progress-bar" th:style="'width: ' + ${job.progress} + '%'"></div>
                        </div>
                        <span style="font-size: 0.85em; color: #666;" th:text="${job.progress} + '%'">50%</span>
                    </td>
                    <td>
                        <a th:href="@{'/status/' + ${job.jobId}}" class="btn-view">View Details →</a>
                    </td>
                </tr>
                <tr th:if="${jobs.isEmpty()}">
                    <td colspan="7">
                        <div class="empty-state">
                            <div class="emoji">🎤</div>
                            <h3>No jobs yet</h3>
                            <p>Start by uploading your first audio file for transcription</p>
                            <a href="/" class="btn-primary">Upload Your First File</a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
