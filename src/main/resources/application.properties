# ====================================
# SERVER CONFIGURATION
# ====================================
server.port=8080
app.base-url=http://localhost:8080

# ====================================
# AZURE SPEECH SERVICES CONFIGURATION
# ====================================
# Get these from: Azure Portal -> Speech Service -> Keys and Endpoint
# Azure Speech Services configuration
azure.speech.key=*************************************
azure.speech.region=eastus
azure.speech.language=auto

# ====================================
# AZURE TRANSLATOR CONFIGURATION (for non-English transcripts)
# ====================================
# Get these from: Azure Portal -> Translator Service -> Keys and Endpoint
azure.translator.key=************************************
azure.translator.region=eastus
azure.translator.endpoint=https://api.cognitive.microsofttranslator.com/

# ====================================
# TRANSCRIPTION OPTIONS
# ====================================
# Whether to keep original language transcript alongside English translation
transcription.keep-original-language=true
# Default target language for translation
transcription.target-language=en
# Whether to auto-detect language (true) or use specified language (false)
transcription.auto-detect=true

# ====================================
# AZURE BLOB STORAGE CONFIGURATION
# ====================================
# Get connection string from: Storage Account -> Access keys -> Connection string
azure.storage.connection-string=***********************************
# Container name where audio files and transcripts will be stored (will be created if doesn't exist)
azure.storage.container-name=todaycontainer

# ====================================
# FILE UPLOAD CONFIGURATION
# ====================================
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# ====================================
# THYMELEAF TEMPLATE CONFIGURATION
# ====================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ====================================
# EMAIL NOTIFICATION (OPTIONAL)
# ====================================
# Enable only if you want email notifications
spring.mail.enabled=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL@gmail.com
spring.mail.password=YOUR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ====================================
# LOGGING CONFIGURATION
# ====================================
logging.level.com.example.speechapp=DEBUG
logging.level.com.azure=INFO
logging.file.name=logs/speech-diarization.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ====================================
# JOB PROCESSING CONFIGURATION
# ====================================
job.polling.max-attempts=120
job.status.update-interval=5